name: PR Checks

on:
  pull_request:
    branches:
      - main
      - master
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  flutter:
    name: Flutter analyze and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Check Dart formatting for changed files
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          changed_dart_files="$(
            git diff --name-only --diff-filter=ACMR \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.sha }}" \
              -- 'lib/**/*.dart' 'test/**/*.dart' \
              | grep -v '_backup\.dart$' || true
          )"

          if [ -z "$changed_dart_files" ]; then
            echo "No changed Dart files to format-check."
            exit 0
          fi

          echo "$changed_dart_files"
          echo "$changed_dart_files" | xargs dart format --output=none --set-exit-if-changed

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test
