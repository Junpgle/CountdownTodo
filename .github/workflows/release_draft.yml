name: Create Release Draft

on:
  push:
    paths:
      - 'update_manifest.json'

permissions:
  contents: write

jobs:
  create-draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          tag="v$(jq -r '.version_name' update_manifest.json)"
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "name=$tag" >> $GITHUB_OUTPUT

      - name: Generate release body
        run: |
          jq -r '
            "# \(.update_info.title)\n\n## 更新日志\n" +
            (.changelog_history[0] |
              "### \(.version_name) (\(.date))\n" +
              (.items | map("- \(.)") | join("\n"))
            )
          ' update_manifest.json > release_body.md

      - name: Create or update draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          if release_json=$(gh release view "$tag" --json body,isDraft 2>/dev/null); then
            if [ "$(echo "$release_json" | jq -r '.isDraft')" != "true" ]; then
              echo "Release $tag is already published, skipping draft update."
              exit 0
            fi

            old_body=$(echo "$release_json" | jq -r '.body')
            new_body=$(cat release_body.md)
            if [ "$old_body" = "$new_body" ]; then
              echo "Release $tag exists and body unchanged, skipping."
            else
              echo "Release $tag exists but body changed, updating..."
              gh release edit "$tag" --notes-file release_body.md --draft
            fi
          else
            echo "Creating new draft release $tag..."
            gh release create "$tag" --title "$tag" --notes-file release_body.md --draft
          fi
