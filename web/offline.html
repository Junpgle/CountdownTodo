<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#6C63FF">
  <title>CountDownTodo 离线</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f8f8ff;
      --fg: #202033;
      --muted: #6a6a84;
      --accent: #6c63ff;
      --panel: rgba(255, 255, 255, 0.78);
      --border: rgba(108, 99, 255, 0.18);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #151522;
        --fg: #f5f5ff;
        --muted: #b7b7c9;
        --panel: rgba(255, 255, 255, 0.08);
        --border: rgba(255, 255, 255, 0.14);
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(420px, 100%);
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: 0 20px 60px rgba(24, 24, 48, 0.14);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 22px;
      line-height: 1.25;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    button {
      width: 100%;
      min-height: 44px;
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main>
    <h1>当前处于离线状态</h1>
    <p>已安装的 CountDownTodo 可以继续打开缓存页面；同步、登录和在线验证会在网络恢复后继续工作。</p>
    <button type="button" onclick="window.location.reload()">重新连接</button>
  </main>
</body>
</html>
